thumbnail.onclick = 
    async function thumbnailClicked(event)
    {
        if (authentication.authenticated) {
            event.preventDefault();
        if (confirm("Logoff?"))
            logoff();
    }
    else
        return true;

async function logon(secret)
{
 
    thumbnail.classList.add("pressed");
  
    var response =
       await authentication.logon(secret);

    if (authentication.authenticated) {

        const params = new URLSearchParams(window.location.search);

        if (params.has("redirect")) {
            var redirect = params.get("redirect");
            var url = new URL(decodeURIComponent(redirect));
            document.location.href = url;
        }
        else {
            document.location.href = "/"
        }
    }
    else {
        alert(response);
    }

    updateForm();
    
   
   
}

async function logoff()
{

    thumbnail.classList.remove("pressed");
    await authentication.logoff();
    form.reset();
    updateForm();
   
}

async function calculateFileSHA256(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        
        // Read file contents as an ArrayBuffer
        reader.readAsArrayBuffer(file);
        
        reader.onload = async (event) => {
            try {
                const arrayBuffer = event.target.result;
                
                // Calculate SHA-256 hash
                const hashBuffer = await crypto.subtle.digest('SHA-256', arrayBuffer);
                
                // Convert ArrayBuffer to hex string
                const hashArray = Array.from(new Uint8Array(hashBuffer));
                const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
                
                resolve(hashHex);
            } catch (error) {
                reject(error);
            }
        };
        
        reader.onerror = (error) => reject(error);
    });
}


async function createSecret(file)
{
    thumbnail.classList.remove("pressed");
   
    if (!file)
        return;

    thumbnail.style.filter = "grayscale(100%)";
    thumbnail.src = URL.createObjectURL(file);
    
 
    await createThumbnail(file);

    var secret = await calculateFileSHA256(file)
   
    thumbnail.style.filter = "none";
    
    return logon(secret);
   
}

fileInput.onchange = 
    (event) => {
        createSecret(fileInput.files[0]);
    }

function createThumbnail(file)
{

    return new Promise((resolve, reject) => {
        
        // Create a thumbail copy from
        // secret file and draw it
        // on the canvas.
        thumbnail.src = "";
   
        var _this = this;
     
        prepareCanvas(canvas);
      
        var image;
      
      
        // Read the secretFile
        var fileReader = new FileReader();
      
        // onload fires after reading is complete
        fileReader.onload = createImage;
      
        // begin reading
        fileReader.readAsDataURL(file);
      
    
        function createImage()
        {
            image = new Image();
         
            image.width = 100;
            
            image.height = 100;
            
            image.onload = imageLoaded;
      
            image.src = URL.createObjectURL(file);
         
        }
      
        function imageLoaded()
        {
   
            var context = canvas.getContext("2d");
      
            // draw the image
            context.drawImage(
                image, 0, 0, canvas.width, canvas.height
            );         

            // get the image
            var jpeg =
                canvas.toDataURL("image/jpeg", 1.0);
     
            // set the thumbnail
            thumbnail.src = jpeg;
      
            localStorage.setItem(
               "authentication.thumbnail",
               thumbnail.src
            );
            resolve();
        }
           

        function prepareCanvas(canvas)
        {
            canvas.width = 100;    
            canvas.height = 100;
      
            var context = canvas.getContext("2d");
         
            // draw the image
            context.clearRect(
                 0, 0, canvas.width, canvas.height
            );         
        }

    });
}
      


function updateForm()
{
 
   var thumbnailSrc = localStorage.getItem(
      "authentication.thumbnail"
   );

   if (thumbnailSrc)
   {
      thumbnail.src = thumbnailSrc;
   }

   if (authentication.authenticated)
   {
      thumbnail.classList.add("pressed");
   }
   else
   {
      thumbnail.classList.remove("pressed");
   }

      
}


document.body.onload = function()
{
   form.reset();
   authentication.getStatus().then(
      function(auth){
         updateForm();
      }
   );
}

document.getCookie = function(name)
{
   var cookies = document.cookie.split(";");
   for (i in cookies)
   {
      var cookie = cookies[i];
      var parts = cookie.split("=");
      var _name = null;
      if (parts.length >= 1)
         _name = parts[0].trim();
      var value = null;
      if (parts.length >= 2)
         value = parts[1].trim();
      if (name == _name) {
         return value;
      }
            
   }
   
   return undefined;
      
}
