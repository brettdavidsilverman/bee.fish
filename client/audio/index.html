<!DOCTYPE html>
<html lang="en">
    <head>
        <script src="/head.js"></script>
        <meta charset="utf-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1"/>
        <script src="../console/console.js"></script>
        <script src="../coordinates/script.js"></script>
        <script src="../movable/script.js"></script>
        <title>Audio</title>
        <style>
#setup, #start, #stop{
    width: calc(100% / 3);;
    aspect-ratio: 1;
}

#setup {
    background-color: grey;
}

#start {
    background-color: green;
}

#stop {
    background-color: red;
}

#processor
{
    float: right;
    width: 70%;
    height: 100%;
}

#canvas {
    width: 100%;
    height: 30%;
    background-color: yellow;
}

.audio {
    background-color: blue;
    position: relative;
    left: 50px;
    top: 50px;
    width: 300px;
    height: 300px;
}
        </style>
    </head>
    <body>
        <h1>Audio</h1>
        <div class="audio movable">
            <textarea id="processor">
class Processor extends
    AudioWorkletProcessor
{
    
    process(inputs, outputs, parameters) {
        
        const output = outputs[0];
        

        for (let channel = 0;
             channel < output.length; 
             ++channel
            ) 
        {
            const channelOutput = 
                output[channel];
            for (let i = 0; 
                 i < channelOutput.length;
                 ++i
                ) 
            {
                channelOutput[i] =
                    Math.sin(this.phase);
                    
                this.phase += 
                    (2 * Math.PI * this.frequency)
                    / this.sampleRate;
            }
        }
        return true;
    }
    
    constructor() {
        super();
        this.phase = 0;
        this.sampleRate = 44100;
        this.frequency = 220;
        var self = this;
        this.port.onmessage =
            (event) => {
                Object.assign(self, event.data);
            }
    }
    

}

registerProcessor('processor', Processor);

            </textarea>
            <div>
                <div id="setup"></div>
                <div id="start"></div>
                <div id="stop"></div>
            </div>
            <canvas id="canvas" class="canvas">
        </div>
        <script type="module">
var console = new Console();
console.log("Hello world");

const audioContext = new AudioContext({
    sampleRate: 44100
});

var processor;
var analyser

var initialSetup = false;

async function setup() {
    
    await audioContext
        .audioWorklet
        .addModule('processor');
        
    processor = 
        new AudioWorkletNode(
            audioContext, 
            'processor'
        );
        
    processor.port.postMessage(
        {
            frequency: 220,
            sampleRate: 44100
        }
    );

    analyser = audioContext.createAnalyser();
    analyser.fftSize = 4096; // Small size for faster, less detailed data
    processor.connect(analyser);

    const bufferLength = analyser.frequencyBinCount;
    const dataArray = new Uint8Array(bufferLength);
    
    analyser.connect(
            audioContext.destination
        );
    var canvas = document.getElementById("canvas");
    var canvasCtx = canvas.getContext("2d");
    // Fill solid color
    canvasCtx.fillStyle = "yellow";
    canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
    
    function getTriggerIndex(data, threshold = 128) {
        // Search for a rising edge: current value > threshold AND previous value <= threshold
        var found = 0;
        for (var i = 1; i < data.length / 2; i++) {
            if (data[i] > threshold && data[i - 1] <= threshold) {
                return i; // Found the stable starting point
                break;
            }
        }
    
        return 0; // Fallback to start if no trigger found
    }
    
    function draw() {
        
        analyser.getByteTimeDomainData(dataArray);
        const triggerIndex = getTriggerIndex(dataArray);
        
        // Fill solid color
        canvasCtx.fillStyle = "yellow";
        canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Begin the path
        canvasCtx.lineWidth = 1;
        canvasCtx.strokeStyle = "black";
        canvasCtx.beginPath();
        
        // Draw each point in the waveform
        const sliceWidth =
            canvas.width / 
            (bufferLength - triggerIndex) ;
            
        var x = 0;
        for (var i = triggerIndex; i < bufferLength; i++) {
            const volume = dataArray[i] / 128.0;
            const y = volume * (canvas.height / 2);

            if (i === triggerIndex) {
                canvasCtx.moveTo(x, y);
            } else {
                canvasCtx.lineTo(x, y);
            }

            x += sliceWidth;
        }

        // Finish the line
        canvasCtx.stroke();
        
        requestAnimationFrame(draw);
    }
    
    
    draw();
    

}

var processorTextArea = document.getElementById("processor");

function redirect(path)
{
    var url = new URL(path);
    url.search = "?redirect=" +
        encodeURIComponent(document.location.href);
    document.location.replace(url);
}

async function  saveProcessor(event) {
    
    var path = document.location.origin +
        document.location.pathname +
        "processor/{HTTP}";

    var parameters = {
        mode: "cors",
        method: "POST",
        credentials: "include",
        headers: {
            "content-type": "text/javascript; charset=utf-8"
        },
        body: event.target.value
    }
    
    var response;
    var text;
    
    try {
        response = await fetch(
            path,
            parameters
        );
        text = await response.text();
    }
    catch (error)
    {
        alert(error);
        return;
    }
    
    
    var status = response.status;
    if (status == 401) // Unauthorised 
    {
        var json  = await response.text();
        var url = JSON.parse(json);
        redirect(url);
        return;
    }
    
    await setup();
    
    alert("Setup");
    
}
    
processorTextArea.onblur = saveProcessor;
processorTextArea.focus();

document.getElementById("setup")
    .onclick =
    (event) => {
        setup();
    }
          
document.getElementById("start")
    .ontouchstart =
    (event) => {
        audioContext.resume();
    }


document.getElementById("stop")
    .ontouchstart =
    (event) => {
        audioContext.suspend();
    }
    
        </script>
    </body>
</html>
