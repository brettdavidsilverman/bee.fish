class Processor extends

{
    // Amplitude as a function of time

    f(t) {
        var sin = Math.sin(this.phase);
                    
        this.phase += 
            (2 * Math.PI * this.frequency)
            / this.sampleRate;
            
        return sin;
    }
    
    process(inputs, outputs, parameters) {
        
        const output = outputs[0];
        const input = inputs[0];
        
        const fInputs[]:

        for (let channel = 0;
             channel < output.length; 
             ++channel
            ) 
        {
            const channelOutput = 
                output[channel];
                
            var channelInput;

                channelnput =
                    input[channel];
                
            for (let i = 0; 
                 i < channelOutput.length;
                 ++i
                ) 
            {
                this.t++;
                
                for (let input = 0;
                     input < inputs.length; 
                     ++input
                    ) 
                {
                    fInputs[input] =
                        inputs[input][channel][i];
                }
                var f = this.f(this.t, fInputs);
                channelOutput[i] = f;
            }
        }
        return true;
    }
    
    constructor() {
        super();
        this.phase = 0;

        <script type="module">
var console = new Console();
console.log("Hello world");

var audioContext;
var processor;
var analyser

var initialSetup = false;

var move = document.getElementById("frequency");

var startPoint;
var scale = 2;
var defaultFrequency = 200; // Hertz

move.onstartmove =
(event) => {
    startPoint = event.point;
}

move.onmoving =
(event) =>
{
    const a = event.point;
    const b = startPoint;
    
    const distance =
        Math.sqrt(
            (b.x - a.x) ** 2 +
            (b.y - a.y) ** 2
        );
        
    processor.port.postMessage(
        {frequency: distance * scale}
    );
}

async function setup() {
    
    if (audioContext)
        await audioContext.close();
        
    audioContext = new AudioContext({
        sampleRate: 44100
    });
    
    audioContext.suspend();

    
    await audioContext
        .audioWorklet
        .addModule('processor');
        
    processor = await
        new AudioWorkletNode(
            audioContext, 
            'processor'
        );
        
    
    
    processor.port.onmessage = (event) => {
        console.log(event.data);
    }


    analyser = audioContext.createAnalyser();
    analyser.fftSize = 4096; // Small size for faster, less detailed data
    processor.connect(analyser);

    const bufferLength = analyser.frequencyBinCount;
    const dataArray = new Uint8Array(bufferLength);
    
    analyser.connect(
            audioContext.destination
        );
    var canvas = document.getElementById("canvas");
    var canvasCtx = canvas.getContext("2d");
    // Fill solid color
    canvasCtx.fillStyle = "yellow";
    canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
    
    function getTriggerIndex(data, threshold = 128) {
        // Search for a rising edge: current value > threshold AND previous value <= threshold
        var found = 0;
        for (var i = 1; i < data.length / 2; i++) {
            if (data[i] > threshold && data[i - 1] <= threshold) {
                return i; // Found the stable starting point
                break;
            }
        }
    
        return 0; // Fallback to start if no trigger found
    }
    
    function draw() {
        
        analyser.getByteTimeDomainData(dataArray);
        const triggerIndex = getTriggerIndex(dataArray);
        
        // Fill solid color
        canvasCtx.fillStyle = "yellow";
        canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Begin the path
        canvasCtx.lineWidth = 1;
        canvasCtx.strokeStyle = "black";
        canvasCtx.beginPath();
        
        // Draw each point in the waveform
        const sliceWidth =
            canvas.width / 
            (bufferLength - triggerIndex) ;
            
        var x = 0;
        for (var i = triggerIndex; i < bufferLength; i++) {
            const volume = dataArray[i] / 128.0;
            const y = volume * (canvas.height / 2);

            if (i === triggerIndex) {
                canvasCtx.moveTo(x, y);
            } else {
                canvasCtx.lineTo(x, y);
            }

            x += sliceWidth;
        }

        // Finish the line
        canvasCtx.stroke();
        
        requestAnimationFrame(draw);
    }
    
    
    draw();
    
    alert("Setup");
    
    processor.port.postMessage({
        sampleRate: audioContext.sampleRate,
        frequency: defaultFrequency
    });
}

var processorTextArea = document.getElementById("processor");

function redirect(path)
{
    var url = new URL(path);
    url.search = "?redirect=" +
        encodeURIComponent(document.location.href);
    document.location.replace(url);
}

async function  saveProcessor(process) {
    
    var path = document.location.origin +
        document.location.pathname +
        "my/processor";

    var parameters = {
        mode: "cors",
        method: "POST",
        credentials: "include",
        headers: {
            "content-type": "text/javascript; charset=utf-8"
        },
        body: process
    }
    
    var response;
    var text;
    
    try {
        
        response = await fetch(
            path,
            parameters
        );
        
        var status = response.status;
        if (status == 401) // Unauthorised 
        {
            var url = await response.json();
            redirect(url);
            return;
        }
        
        text = await response.text();
    }
    catch (error)
    {
        alert(error);
        return;
    }
    
    await setup();
    
    
    
}
    
processorTextArea.onblur =
(event) => {
    saveProcessor(event.target.value)
}

await saveProcessor(processorTextArea.value);

    }
