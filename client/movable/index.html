<!DOCTYPE html>
<html>
    <head>
       <meta name="viewport" content="width=device-width, initial-scale=1"></meta>
       <script>
window.onerror = function(message, source, line) {
    alert(source + "\n" + message + "\n" + line);
}

function properties(obj) {
     var ps = [];
     for (var p in obj) {
         ps.push(p);
     }
     ps.sort();
     document.write(ps.join("<br \>"));
}
       </script>

       <script src="../coordinates/script.js"></script>
       <script src="script.js"></script>
       <link rel="stylesheet" type="text/css" href="style.css" />
              <link rel="stylesheet" type="text/css" href="../style.css" />
    
       <style>

#outer {
    background-color: blue;
    position: relative;
    left: 50px;
    top: 50px;
    width: 200px;
    height: 200px;
}

#inner {
    background-color: red;
    position: relative;
    left: 75px;
    top: 75px;
    width: 50px;
    height: 50px;
}

#move {
    position: relative;
    top: 300px;
    left: 50px;
    width: 50px;
    height: 50px;
    background-color: grey;
}



       </style>
    </head>
    <body>
       <h1>Movable</h1>
       <a href="../coordinates/script.js">coordinates/script.js</a>
       <br />
       <a href="script.js">script.js</a>
       <div>
          Move the blue or red square by dragging
          Add the class "movable" to elements you wish to be movable
       </div>
       <div id="outer" class="movable" onclick="alert(1)">
           <div id="inner" class="movable" onclick="alert(2)"></div>
       </div>
       <div id="display"></div>
       <div id="move" class="movable">+</div>
          
       <pre>
           <script>
var move = document.getElementById("move");
var display = document.getElementById("display");

move.addEventListener("moving", onmove);

function onmove(event)

{
    display.innerText = JSON.stringify({
       x: event.point.x, 
       y: event.point.y
    }, null, "   ");
}
           </script>
        </pre>

    </body>
</html>
