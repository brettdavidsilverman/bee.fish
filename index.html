function getCursorLineAndColumn(textarea) {
  // Get the text from the start up to the cursor position
  const textUpToCaret = textarea.value.substr(0, textarea.selectionStart);
  
  // Split the substring by line breaks
  const textLines = textUpToCaret.split('\n');
  
  const currentLine = textLines.length; // 1-indexed line number
  const currentColumn = textLines[textLines.length - 1].length; // 0-indexed column

  return { line: currentLine, column: currentColumn };
}


async function fetchLines(url, f) {
    
    fetchButton.disabled = true;
    
    var parameters = {
        mode: "cors",
        method: "GET",
        credentials: "include"
    }
    var response;
    
    try {
        response = await fetch(url, parameters);
        if (response.status == 401) // Unauthorised 
        {
            var json = await response.json();
            redirect(json);
            return;
        }
        else if (response.status != 200) {
            var json = await response.json();
            throw new Error(
                json
            );
        }
    }
    catch (error)
    {
        editor.value = error;
        return;
    }
    finally {
        fetchButton.disabled = false;
    }
    
        
    
        
    contentType.value =
        response.headers.get("content-type");
    

    // Get the response body as a ReadableStream
    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    var lineBuffer = '';

    while (true) {
        
        const { done, value } =
            await reader.read();
            
        if (done) {
            break;
        }

        // Decode the chunk and add to buffer
        lineBuffer += decoder.decode(value, { stream: true });

        // Process lines when a newline character is found
        const lines = lineBuffer.split('\n');
        for (let i = 0; i < lines.length - 1; i++) {
            const line = lines[i];
            f(line + "\n");
        }
        lineBuffer = lines[lines.length - 1];
    }
    
    if (lineBuffer) {
        f(lineBuffer);
    }
    
    fetchButton.disabled = false;
}

// Example usage:

function redirect(path)
{
    var url = new URL(path);
    url.search = "?redirect=" +
        encodeURIComponent(document.location.href);
    document.location.replace(url);
}

async function downloadJSON(decode = false) {
    var url = new URL(pathInput.value);
    
    fetchButton.disabled = true;
    editor.value = "Loading....";
    
    
    searchResults = [];
    
    var firstLine = true;
    
    await fetchLines(
        url,
        (line) => {
            if (firstLine) {
                editor.value = "";
                firstLine = false;
            }
            if (decode && line != "[\n" && line != "]")
            {
                line = line.substr(0, line.length - 1);
                if (line.endsWith(","))
                {
                    line = line.substr(0, line.length - 1);
                }
                searchResults.push(JSON.parse(line));
                line = decodeURIComponent(JSON.parse(line));
                line += "\n";
                editor.value += line;
            }
            else if (!decode)
                editor.value += line;
        }
    );
    
    
}

async function uploadData(path, data, contentType, contentLength, halfDuplex = false)
{

    var parameters = {
        mode: "cors",
        method: "POST",
        credentials: "include",
        headers: {
            "content-type": contentType
        },
        body: data
    }
    
    if (halfDuplex)
        parameters["duplex"] = "half";
        
    saveButton.disabled = true;
    fileInput.disabled = true;
       
    if (path.endsWith("/"))
        path = path.substr(0, path.length - 1);
      
    
    var status;
        
    try
    {
        await authenticate();
        var response = await fetch(
            path,
            parameters
        );
        
        var status = response.status;
        if (status == 200) {
            var json = await response.json();
            json = decodeURI(json);
            alert(json);
            pathInput.value = json;
            localStorage.setItem("path", pathInput.value);
        }
        else if (status == 401) // Unauthorised 
        {
            var json = await response.json();
            redirect(json);
            return;
        }
        else {
            var json = await response.json();
            throw new Error(
                json
            );
        }
        
    }
    catch (error)
    {
        //alert(error);
    }
    finally {
        saveButton.disabled = false;
        fileInput.disabled = false;
    }
        
}

        // UTF-8 is the default

function switchFunctions(showFunctions)
{

    var json = getJSON();
    
    if (showFunctions) {
        json = displayFunctions(json);
    }
    else {
        json = hideFunctions(json);
        json = JSON.stringify(json, null, "    ");
    }
    editor.value = json;
}

function getJSON()
{
    var json = editor.value;
    
    if (json == "")
        return undefined;
        
    var f = new Function(
        "return (" + json + ")"
    );
    json = f();
    return json;
}
